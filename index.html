<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>🏆 کازینوی خانوادگی | محمدمهدی</title>
    <style>
        :root {
            --bg: #0a0a14; --surface: #141428; --surface2: #1e1e36;
            --gold: #d4a843; --gold-light: #f0d68a; --text: #f0e6d2;
            --text-secondary: #b0a48e; --border: #2a2a44;
            --radius: 16px; --shadow: 0 12px 40px rgba(0,0,0,0.6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', 'Segoe UI', 'Iranian Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px; line-height: 1.7;
        }
        .app-container { width: 100%; max-width: 520px; }
        .app-container.wide { max-width: 1100px; }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px 24px;
            box-shadow: var(--shadow); position: relative; margin-bottom: 20px;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: var(--radius) var(--radius) 0 0;
        }
        h1, h2, h3 { color: var(--gold-light); text-align: center; margin-bottom: 12px; }
        .footer-text { text-align: center; font-size: 0.75em; color: var(--text-secondary); margin-top: 20px; opacity: 0.8; z-index: 1; }
        .balance-big { font-size: 2.2em; font-weight: bold; color: var(--gold-light); text-align: center; letter-spacing: 2px; }
        input, select {
            width: 100%; padding: 14px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 12px; color: var(--text);
            font-size: 1em; margin: 8px 0;
        }
        .btn {
            display: inline-block; padding: 14px 24px; border: none; border-radius: 12px;
            font-size: 1em; cursor: pointer; font-weight: bold; text-align: center;
        }
        .btn-gold { background: linear-gradient(135deg, #c8963e, #d4a843); color: #1a1a0a; width: 100%; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-sm { padding: 8px 16px; font-size: 0.85em; border-radius: 10px; }
        .table-responsive { overflow-x: auto; margin: 12px 0; border-radius: 12px; background: rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; white-space: nowrap; min-width: 500px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid var(--border); }
        th { background: var(--surface2); color: var(--gold); font-weight: bold; }
        tr:hover td { background: rgba(212,168,67,0.08); }
        .badge {
            display: inline-block; padding: 5px 12px; border-radius: 20px;
            font-size: 0.75em; font-weight: bold; margin: 0 2px;
        }
        .badge-win { background: rgba(39,174,96,0.3); color: #2ecc71; }
        .badge-lose { background: rgba(192,57,43,0.3); color: #e74c3c; }
        .badge-auto { background: rgba(52,152,219,0.3); color: #3498db; }
        .badge-info { background: rgba(241,196,15,0.25); color: #f1c40f; }
        .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; border-bottom: 2px solid var(--border); }
        .tab-btn {
            padding: 10px 18px; background: transparent; border: none;
            color: var(--text-secondary); cursor: pointer; font-size: 0.9em;
        }
        .tab-btn.active { color: var(--gold-light); font-weight: bold; background: rgba(212,168,67,0.12); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .match-time {
            display: inline-block; background: rgba(212,168,67,0.2);
            color: var(--gold-light); padding: 4px 12px; border-radius: 20px;
            font-size: 0.8em; margin-bottom: 8px;
        }
        .countdown {
            background: #2c3e50; color: #f1c40f; padding: 2px 8px; border-radius: 12px;
            font-size: 0.9em; margin-right: 8px; font-weight: bold;
        }
        .countdown.urgent { background: #c0392b; color: #fff; }
        .progress-bar {
            height: 6px; background: #333; border-radius: 3px; margin: 4px 0; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%; background: #f1c40f; transition: width 1s linear;
        }
        .pulse-border {
            border: 2px solid var(--gold);
            animation: pulseBorder 2s infinite;
        }
        @keyframes pulseBorder {
            0% { box-shadow: 0 0 5px var(--gold); }
            50% { box-shadow: 0 0 20px var(--gold), 0 0 30px var(--gold-light); }
            100% { box-shadow: 0 0 5px var(--gold); }
        }
        .coin {
            display: inline-block; animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        .version-alert {
            position: fixed; top: 0; left: 0; right: 0; background: #f1c40f; color: #000;
            text-align: center; padding: 8px; font-weight: bold; z-index: 9999;
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        .print-btn { background: #3498db; color: white; margin: 4px; }
        .result-detail { font-size: 0.8em; color: #aaa; display: block; }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer"></div>
    <div class="footer-text">طراح محمدمهدی | نسخه ۱.۰ | ۱۴۰۵</div>

    <script>
        (function() {
            const STORAGE_KEY = 'casinoFamilyV10';
            const VERSION_KEY = 'casinoDataVersion';
            const DATA_VERSION = 16; // حذف آواتارها

            const DEFAULT_DATA = {
                users: [
                    { id: 'rez', name: 'رضا', password: '1234', balance: -5 },
                    { id: 'sep', name: 'سپیده', password: '5678', balance: -25 },
                    { id: 'rey', name: 'ریحانه', password: '1111', balance: 0 },
                    { id: 'شایان', name: 'شایان', password: '2222', balance: -40 }
                ],
                bets: [
                    { userId: 'rez', matchId: 1, team: 'کانادا', amount: 10, odds: 1.5, result: 'win', profit: 5, type: 'manual' },
                    { userId: 'sep', matchId: 1, team: 'کانادا', amount: 10, odds: 1.5, result: 'win', profit: 5, type: 'manual' },
                    { userId: 'rey', matchId: 1, team: 'کانادا', amount: 10, odds: 1.5, result: 'win', profit: 5, type: 'manual' },
                    { userId: 'شایان', matchId: 1, team: 'آفریقای جنوبی', amount: 10, odds: 2.0, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'sep', matchId: 2, team: 'ژاپن', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'شایان', matchId: 2, team: 'ژاپن', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'rey', matchId: 2, team: 'برزیل', amount: 10, odds: 2.0, result: 'win', profit: 10, type: 'manual' },
                    { userId: 'rez', matchId: 2, team: 'برزیل', amount: 10, odds: 2.0, result: 'win', profit: 10, type: 'manual' },
                    { userId: 'rez', matchId: 3, team: 'آلمان', amount: 10, odds: 1.1, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'rey', matchId: 3, team: 'آلمان', amount: 15, odds: 1.1, result: 'lose', profit: -15, type: 'manual' },
                    { userId: 'شایان', matchId: 3, team: 'آلمان', amount: 10, odds: 1.1, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'sep', matchId: 3, team: 'آلمان', amount: 10, odds: 1.1, result: 'lose', profit: -10, type: 'auto' },
                    { userId: 'rez', matchId: 4, team: 'هلند', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'rey', matchId: 4, team: 'هلند', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'شایان', matchId: 4, team: 'هلند', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'sep', matchId: 4, team: 'هلند', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'auto' }
                ],
                matches: [
                    { id: 1, team1: 'کانادا', team2: 'آفریقای جنوبی', odds1: 1.5, odds2: 2.0, result: 'کانادا', resultDetail: '۱-۰', status: 'closed', time: '۲۲:۳۰ - ۷ تیر' },
                    { id: 2, team1: 'برزیل', team2: 'ژاپن', odds1: 2.0, odds2: 1.5, result: 'برزیل', resultDetail: '۲-۱', status: 'closed', time: '۲۰:۳۰ - ۸ تیر' },
                    { id: 3, team1: 'آلمان', team2: 'پاراگوئه', odds1: 1.1, odds2: 5.0, result: 'پاراگوئه', resultDetail: '۱-۱ (پنالتی ۴-۳ پاراگوئه)', status: 'closed', time: '۰۰:۰۰ - ۹ تیر' },
                    { id: 4, team1: 'هلند', team2: 'مراکش', odds1: 1.5, odds2: 2.0, result: 'مراکش', resultDetail: '۱-۱ (پنالتی ۳-۲ مراکش)', status: 'closed', time: '۰۴:۳۰ - ۹ تیر' },
                    { id: 5, team1: 'ساحل عاج', team2: 'نروژ', odds1: 2.0, odds2: 1.5, result: null, resultDetail: null, status: 'open', time: '۲۰:۳۰ - ۹ تیر' },
                    { id: 6, team1: 'فرانسه', team2: 'سوئد', odds1: 1.1, odds2: 5.0, result: null, resultDetail: null, status: 'upcoming', time: '۰:۳۰ - ۱۰ تیر' },
                    { id: 7, team1: 'مکزیک', team2: 'اکوادور', odds1: 1.5, odds2: 2.0, result: null, resultDetail: null, status: 'upcoming', time: '۴:۳۰ - ۱۰ تیر' }
                ],
                casinoBalance: 80
            };

            const countryFlags = {
                'کانادا': '🇨🇦', 'آفریقای جنوبی': '🇿🇦', 'برزیل': '🇧🇷', 'ژاپن': '🇯🇵',
                'آلمان': '🇩🇪', 'پاراگوئه': '🇵🇾', 'هلند': '🇳🇱', 'مراکش': '🇲🇦',
                'ساحل عاج': '🇨🇮', 'نروژ': '🇳🇴', 'فرانسه': '🇫🇷', 'سوئد': '🇸🇪',
                'مکزیک': '🇲🇽', 'اکوادور': '🇪🇨'
            };
            function getFlag(c) { return countryFlags[c] || '🏳️'; }

            function loadData() {
                const savedVersion = localStorage.getItem(VERSION_KEY);
                const savedData = localStorage.getItem(STORAGE_KEY);
                const prevVersion = savedVersion ? parseInt(savedVersion) : 0;
                if (!savedVersion || prevVersion < DATA_VERSION) {
                    localStorage.setItem(VERSION_KEY, DATA_VERSION);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_DATA));
                    if (prevVersion > 0) showVersionAlert();
                    return JSON.parse(JSON.stringify(DEFAULT_DATA));
                }
                if (savedData) {
                    try { return JSON.parse(savedData); } catch (e) {}
                }
                return JSON.parse(JSON.stringify(DEFAULT_DATA));
            }

            function showVersionAlert() {
                const alertDiv = document.createElement('div');
                alertDiv.className = 'version-alert';
                alertDiv.innerHTML = '✨ بازی‌های جدید اضافه شدند – اطلاعات به‌روز شد';
                document.body.prepend(alertDiv);
                setTimeout(() => alertDiv.remove(), 5000);
            }

            let appData = loadData();
            let currentUser = null;

            function formatToman(v) { return (v * 1000).toLocaleString('fa-IR') + ' تومان'; }
            function showBalance(v) { return (v * 1000).toLocaleString('fa-IR') + ' تومان'; }
            function getUserById(id) { return appData.users.find(u => u.id === id); }
            function getMatchById(id) { return appData.matches.find(m => m.id === id); }

            const persianDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
            const persianMonths = {
                'فروردین':0,'اردیبهشت':1,'خرداد':2,'تیر':3,'مرداد':4,'شهریور':5,
                'مهر':6,'آبان':7,'آذر':8,'دی':9,'بهمن':10,'اسفند':11
            };
            function parsePersianNumber(s) { let o=''; for(let c of s){ let i=persianDigits.indexOf(c); o+=i>=0?i:c; } return o; }
            function parseMatchTime(timeStr) {
                const parts = timeStr.split(' - '); if(parts.length!==2) return null;
                const timePart = parsePersianNumber(parts[0].trim());
                const datePart = parts[1].trim();
                const [hStr,mStr] = timePart.split(':'); const hr=parseInt(hStr), mn=parseInt(mStr);
                const dParts = datePart.split(' '); if(dParts.length!==2) return null;
                const day=parseInt(parsePersianNumber(dParts[0])); const monthName=dParts[1];
                const month = persianMonths[monthName]; if(month===undefined || isNaN(hr)||isNaN(mn)||isNaN(day)) return null;
                const now=new Date(); const yr=now.getFullYear();
                const iranOffset = 4.5*60*60000;
                const utc = Date.UTC(yr,month,day,hr,mn) - iranOffset;
                return new Date(utc);
            }

            function getTimeRemaining(matchTimeStr) {
                const matchDate = parseMatchTime(matchTimeStr);
                if (!matchDate) return { text: '', percent: 0, urgent: false };
                const now = Date.now();
                const diff = matchDate.getTime() - now;
                if (diff <= 0) return { text: 'آغاز شده', percent: 100, urgent: false };
                const totalSeconds = Math.floor(diff / 1000);
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                const urgent = diff < 5 * 60 * 1000;
                return {
                    text: `${hours}ساعت ${minutes}دقیقه ${seconds}ثانیه`,
                    percent: Math.min(100, Math.floor((1 - diff / (2*60*60*1000)) * 100)),
                    urgent
                };
            }

            function updateTimers() {
                document.querySelectorAll('.countdown').forEach(el => {
                    const matchTime = el.dataset.time;
                    if (matchTime) {
                        const info = getTimeRemaining(matchTime);
                        el.textContent = info.text;
                        el.className = 'countdown' + (info.urgent ? ' urgent' : '');
                        const bar = el.parentElement.querySelector('.progress-fill');
                        if (bar) bar.style.width = info.percent + '%';
                    }
                });
            }
            setInterval(updateTimers, 1000);

            function renderApp() {
                const container = document.getElementById('appContainer');
                if (!currentUser) {
                    container.classList.remove('wide');
                    container.innerHTML = renderLogin();
                    attachLoginEvents();
                } else if (currentUser.id === 'admin') {
                    container.classList.add('wide');
                    container.innerHTML = renderAdminPanel();
                    attachAdminEvents();
                } else {
                    container.classList.remove('wide');
                    container.innerHTML = renderUserPanel();
                    attachUserEvents();
                }
                setTimeout(updateTimers, 100);
            }

            function renderLogin() {
                return `
                <div class="card">
                    <h1>🎰 کازینوی خانوادگی</h1>
                    <p style="text-align:center;">لطفاً نام کاربری و رمز خود را وارد کنید</p>
                    <input type="text" id="loginUsername" placeholder="نام کاربری">
                    <input type="password" id="loginPassword" placeholder="رمز عبور" inputmode="numeric" pattern="[0-9]*">
                    <button class="btn btn-gold" id="btnLoginUser">ورود کاربر</button>
                    <button class="btn btn-outline" id="btnAdminLogin" style="width:100%; margin-top:8px;">ورود ادمین</button>
                    <button class="btn btn-outline" id="btnHelp" style="width:100%; margin-top:8px;">📖 راهنما</button>
                </div>`;
            }

            function attachLoginEvents() {
                document.getElementById('btnLoginUser').onclick = () => {
                    const uid = document.getElementById('loginUsername').value.trim();
                    const pwd = document.getElementById('loginPassword').value.trim();
                    if (!uid || !pwd) return alert('لطفاً هر دو فیلد را پر کنید.');
                    const user = appData.users.find(u => u.id === uid && u.password === pwd);
                    if (user) { currentUser = user; renderApp(); }
                    else alert('❌ نام کاربری یا رمز اشتباه است.');
                };
                document.getElementById('btnAdminLogin').onclick = () => {
                    const pass = prompt('رمز ادمین (۱۲ رقمی):');
                    if (pass === '123123456') { currentUser = { id: 'admin', name: 'ادمین' }; renderApp(); }
                    else alert('❌ رمز ادمین نادرست است.');
                };
                document.getElementById('btnHelp').onclick = () => {
                    alert(`📌 قوانین:\n- حداقل شرط: ۱۰,۰۰۰ تومان\n- در صورت عدم انتخاب، تیم با ضریب کمتر توسط سیستم انتخاب می‌شود.\n- شرط‌های خودکار با نشان ⚡ مشخص می‌شوند.`);
                };
            }

            function renderUserPanel() {
                const user = getUserById(currentUser.id);
                if (!user) { logout(); return ''; }
                const openMatches = appData.matches.filter(m => m.status === 'open');
                const upcomingMatches = appData.matches.filter(m => m.status === 'upcoming');
                const bets = appData.bets.filter(b => b.userId === user.id);
                const totalProfit = bets.reduce((s, b) => s + (b.profit || 0), 0);

                return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <span>👤 ${user.name} (${user.id})</span>
                        <button class="btn btn-outline btn-sm" id="btnLogout">🚪 خروج</button>
                    </div>
                    <div class="balance-big">💰 موجودی: ${showBalance(user.balance)}</div>
                    <p style="text-align:center;">سود/زیان کل: <b style="color:${totalProfit>=0?'#2ecc71':'#e74c3c'}">${formatToman(totalProfit)}</b></p>
                </div>

                <div class="card">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="dashboard">📊 بازی‌ها</button>
                        <button class="tab-btn" data-tab="history">📋 تاریخچه</button>
                    </div>
                    <div class="tab-content active" id="tab-dashboard">
                        ${openMatches.length > 0 ? `
                        <h3>🟢 بازی جاری</h3>
                        ${openMatches.map(m => {
                            const timeInfo = getTimeRemaining(m.time);
                            return `
                            <div class="card pulse-border" style="margin-bottom:12px;">
                                <b>${m.team1} ${getFlag(m.team1)} vs ${m.team2} ${getFlag(m.team2)}</b>
                                <p>${m.time} <span class="countdown${timeInfo.urgent ? ' urgent' : ''}" data-time="${m.time}">${timeInfo.text}</span></p>
                                <div class="progress-bar"><div class="progress-fill" style="width:${timeInfo.percent}%"></div></div>
                                <p>ضرایب: ${m.team1} ${m.odds1}x, ${m.team2} ${m.odds2}x</p>
                                <div class="form-group">
                                    <label>💵 ماشین حساب سود (تومان)</label>
                                    <input type="number" id="calcAmount_${m.id}" min="0" value="" placeholder="مبلغ شرط">
                                </div>
                                <div style="display:flex; justify-content:center; gap:2rem;">
                                    <span>${m.team1}: <b id="calcProfit1_${m.id}">${formatToman(0)}</b></span>
                                    <span>${m.team2}: <b id="calcProfit2_${m.id}">${formatToman(0)}</b></span>
                                </div>
                            </div>`;
                        }).join('')}
                        ` : '<p style="text-align:center;">هیچ بازی جاری‌ای وجود ندارد.</p>'}

                        ${upcomingMatches.length > 0 ? `
                        <h3>🔵 بازی‌های پیش‌رو</h3>
                        ${upcomingMatches.map(m => {
                            const timeInfo = getTimeRemaining(m.time);
                            return `
                            <div class="card">
                                <b>${m.team1} ${getFlag(m.team1)} vs ${m.team2} ${getFlag(m.team2)}</b>
                                <p>${m.time} <span class="countdown${timeInfo.urgent ? ' urgent' : ''}" data-time="${m.time}">${timeInfo.text}</span></p>
                                <div class="progress-bar"><div class="progress-fill" style="width:${timeInfo.percent}%"></div></div>
                                <p>ضرایب: ${m.team1} ${m.odds1}x, ${m.team2} ${m.odds2}x</p>
                            </div>`;
                        }).join('')}
                        ` : ''}
                    </div>

                    <div class="tab-content" id="tab-history">
                        <h3>📋 شرط‌های من</h3>
                        ${bets.length === 0 ? '<p>شرطی ثبت نشده.</p>' : `
                        <div class="table-responsive">
                        <table><thead><tr><th>بازی</th><th>تیم</th><th>مبلغ</th><th>ضریب</th><th>نتیجه</th><th>سود/زیان</th></tr></thead><tbody>
                        ${bets.map(b => {
                            const m = getMatchById(b.matchId);
                            let badge = '';
                            if (b.result === 'win') badge = '<span class="badge badge-win">برد</span> <span class="coin">💰</span>';
                            else if (b.result === 'lose') badge = '<span class="badge badge-lose">باخت</span>';
                            else if (b.type === 'auto') badge = '<span class="badge badge-auto">خودکار ⚡</span>';
                            else badge = '<span class="badge badge-info">در انتظار</span>';
                            let detail = '';
                            if (b.type === 'auto') detail = '<br><small style="color:#3498db;">(سیستم ثبت کرد)</small>';
                            return `<tr>
                                <td>${m ? m.team1 + ' ' + getFlag(m.team1) + ' vs ' + m.team2 + ' ' + getFlag(m.team2) : '?'}</td>
                                <td>${b.team} ${getFlag(b.team)}</td>
                                <td>${formatToman(b.amount)}</td>
                                <td>${b.odds}x</td>
                                <td>${badge}${detail}</td>
                                <td style="color:${b.result==='win'?'#2ecc71':b.result==='lose'?'#e74c3c':'#f1c40f'}">${b.result ? formatToman(b.profit) : '---'}</td>
                            </tr>`;
                        }).join('')}
                        </tbody></table></div>`}
                    </div>
                </div>`;
            }

            function attachUserEvents() {
                document.getElementById('btnLogout').onclick = logout;
                document.querySelectorAll('.tab-btn').forEach(b => b.onclick = function() {
                    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('tab-' + b.dataset.tab).classList.add('active');
                });

                const openMatches = appData.matches.filter(m => m.status === 'open');
                openMatches.forEach(m => {
                    const input = document.getElementById('calcAmount_' + m.id);
                    if (input) {
                        input.addEventListener('input', function() {
                            const amount = parseInt(this.value) || 0;
                            const profit1 = Math.round(amount * m.odds1 - amount);
                            const profit2 = Math.round(amount * m.odds2 - amount);
                            const el1 = document.getElementById('calcProfit1_' + m.id);
                            const el2 = document.getElementById('calcProfit2_' + m.id);
                            if (el1) el1.textContent = formatToman(profit1 / 1000);
                            if (el2) el2.textContent = formatToman(profit2 / 1000);
                        });
                    }
                });
            }

            function renderAdminPanel() {
                const sortedUsers = [...appData.users].sort((a, b) => {
                    if (b.balance !== a.balance) return b.balance - a.balance;
                    const aWins = appData.bets.filter(bet => bet.userId === a.id && bet.result === 'win').length;
                    const bWins = appData.bets.filter(bet => bet.userId === b.id && bet.result === 'win').length;
                    return bWins - aWins;
                });

                return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <span>👑 ادمین (مدیر کل)</span>
                        <button class="btn btn-outline btn-sm" id="btnLogout">🚪 خروج</button>
                    </div>
                    <p style="text-align:center;">💰 صندوق: <b>${showBalance(appData.casinoBalance)}</b></p>
                    <button class="btn btn-sm print-btn" onclick="window.print()">🖨️ پرینت</button>
                </div>

                <div class="card">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="overview">📊 نمای کلی</button>
                        <button class="tab-btn" data-tab="odds">🧮 ماشین حساب ضرایب</button>
                        <button class="tab-btn" data-tab="history">📋 تاریخچه</button>
                    </div>

                    <div class="tab-content active" id="tab-overview">
                        <h3>👥 رتبه‌بندی کاربران</h3>
                        <div class="table-responsive">
                        <table><thead><tr><th>رتبه</th><th>نام</th><th>یوزر</th><th>موجودی</th><th>تعداد برد</th></tr></thead><tbody>
                        ${sortedUsers.map((u, i) => `
                            <tr>
                                <td>${i+1}</td>
                                <td>${u.name}</td>
                                <td>${u.id}</td>
                                <td>${showBalance(u.balance)}</td>
                                <td>${appData.bets.filter(b => b.userId === u.id && b.result === 'win').length}</td>
                            </tr>
                        `).join('')}
                        </tbody></table></div>
                        ${renderMatchesSummary()}
                    </div>

                    <div class="tab-content" id="tab-odds">
                        <h3>🧮 محاسبه خودکار ضرایب</h3>
                        <input type="text" id="oddsTeam1" placeholder="نام تیم اول">
                        <input type="text" id="oddsTeam2" placeholder="نام تیم دوم">
                        <input type="number" id="oddsProb1" placeholder="احتمال تیم اول (%)">
                        <input type="number" id="oddsProb2" placeholder="احتمال تیم دوم (%)">
                        <button class="btn btn-gold" id="btnCalculateOdds">محاسبه</button>
                        <div id="oddsResult" class="card" style="margin-top:12px; display:none;"></div>
                        <p style="font-size:0.8em; margin-top:8px;">❗ قوانین: مارجین ۱۰٪، مضرب ۰.۵، حداقل ۱.۵ برای ≤۵۰٪، قانون ۱.۱</p>
                    </div>

                    <div class="tab-content" id="tab-history">
                        <h3>📜 تاریخچه همه شرط‌ها</h3>
                        <div class="table-responsive">
                        <table><thead><tr><th>کاربر</th><th>بازی</th><th>تیم</th><th>مبلغ</th><th>ضریب</th><th>نتیجه</th><th>سود</th></tr></thead><tbody>
                        ${appData.bets.map(b => {
                            const u = getUserById(b.userId);
                            const m = getMatchById(b.matchId);
                            let resultBadge = '';
                            if (b.result === 'win') resultBadge = '<span class="badge badge-win">برد</span> <span class="coin">💰</span>';
                            else if (b.result === 'lose') resultBadge = '<span class="badge badge-lose">باخت</span>';
                            else if (b.type === 'auto') resultBadge = '<span class="badge badge-auto">خودکار ⚡</span>';
                            else resultBadge = '<span class="badge badge-info">در انتظار</span>';
                            return `<tr>
                                <td>${u ? u.name : '?'}</td>
                                <td>${m ? m.team1 + ' ' + getFlag(m.team1) + ' vs ' + m.team2 + ' ' + getFlag(m.team2) : '?'}</td>
                                <td>${b.team} ${getFlag(b.team)}</td>
                                <td>${formatToman(b.amount)}</td>
                                <td>${b.odds}x</td>
                                <td>${resultBadge}</td>
                                <td style="color:${b.result==='win'?'#2ecc71':b.result==='lose'?'#e74c3c':'#f1c40f'}">${b.result ? formatToman(b.profit) : '---'}</td>
                            </tr>`;
                        }).join('')}
                        </tbody></table></div>
                    </div>
                </div>`;
            }

            function renderMatchesSummary() {
                const open = appData.matches.filter(m => m.status === 'open');
                const upcoming = appData.matches.filter(m => m.status === 'upcoming');
                const closed = appData.matches.filter(m => m.status === 'closed');
                let html = '';
                if (open.length > 0) {
                    html += '<h3>🟢 بازی‌های جاری</h3>';
                    html += open.map(m => {
                        const timeInfo = getTimeRemaining(m.time);
                        return `<div class="card pulse-border"><b>${m.team1} ${getFlag(m.team1)} vs ${m.team2} ${getFlag(m.team2)}</b>
                        <p>${m.time} <span class="countdown${timeInfo.urgent?' urgent':''}" data-time="${m.time}">${timeInfo.text}</span></p>
                        <div class="progress-bar"><div class="progress-fill" style="width:${timeInfo.percent}%"></div></div>
                        <p>ضرایب: ${m.team1} ${m.odds1}x, ${m.team2} ${m.odds2}x</p></div>`;
                    }).join('');
                }
                if (upcoming.length > 0) {
                    html += '<h3>🔵 بازی‌های پیش‌رو</h3>';
                    html += upcoming.map(m => {
                        const timeInfo = getTimeRemaining(m.time);
                        return `<div class="card"><b>${m.team1} ${getFlag(m.team1)} vs ${m.team2} ${getFlag(m.team2)}</b>
                        <p>${m.time} <span class="countdown${timeInfo.urgent?' urgent':''}" data-time="${m.time}">${timeInfo.text}</span></p>
                        <div class="progress-bar"><div class="progress-fill" style="width:${timeInfo.percent}%"></div></div>
                        <p>ضرایب: ${m.team1} ${m.odds1}x, ${m.team2} ${m.odds2}x</p></div>`;
                    }).join('');
                }
                if (closed.length > 0) {
                    html += '<h3>⚫ بازی‌های گذشته</h3>';
                    html += closed.map(m => {
                        const detail = m.resultDetail ? `<span class="result-detail">(${m.resultDetail})</span>` : '';
                        return `<div class="card"><b>${m.team1} ${getFlag(m.team1)} vs ${m.team2} ${getFlag(m.team2)}</b>
                        <p>${m.time} | ضرایب: ${m.team1} ${m.odds1}x, ${m.team2} ${m.odds2}x | نتیجه: ${m.result} ${detail}</p></div>`;
                    }).join('');
                }
                return html;
            }

            function attachAdminEvents() {
                document.getElementById('btnLogout').onclick = logout;
                document.querySelectorAll('.tab-btn').forEach(b => b.onclick = function() {
                    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('tab-' + b.dataset.tab).classList.add('active');
                });

                document.getElementById('btnCalculateOdds').onclick = () => {
                    const t1 = document.getElementById('oddsTeam1').value.trim();
                    const t2 = document.getElementById('oddsTeam2').value.trim();
                    const p1 = parseFloat(document.getElementById('oddsProb1').value);
                    const p2 = parseFloat(document.getElementById('oddsProb2').value);
                    if (!t1 || !t2 || isNaN(p1) || isNaN(p2)) return alert('همه فیلدها را پر کنید.');
                    let odds1, odds2;
                    if (p1 <= 50 && p2 <= 50) { odds1 = 1.5; odds2 = 1.5; }
                    else if (p1 <= 50) { odds1 = 1.5; odds2 = 1 / (1.1 - 1/1.5); }
                    else if (p2 <= 50) { odds2 = 1.5; odds1 = 1 / (1.1 - 1/1.5); }
                    else { odds1 = 1.1; odds2 = 1.1; }
                    odds1 = Math.ceil(odds1 * 2) / 2;
                    odds2 = Math.ceil(odds2 * 2) / 2;
                    if (odds1 <= 1.0) odds1 = 1.1;
                    if (odds2 <= 1.0) odds2 = 1.1;
                    document.getElementById('oddsResult').style.display = 'block';
                    document.getElementById('oddsResult').innerHTML = `<h3>ضرایب</h3><p>${t1}: <b>${odds1}x</b></p><p>${t2}: <b>${odds2}x</b></p>`;
                };
            }

            function logout() { currentUser = null; renderApp(); }

            renderApp();
        })();
    </script>
</body>
</html>
