            function renderAdminPanel(){const su=[...appData.users].sort((a,b)=>{if(b.balance!==a.balance)return b.balance-a.balance;const aw=appData.bets.filter(bt=>bt.userId===a.id&&bt.result==='win').length,bw=appData.bets.filter(bt=>bt.userId===b.id&&bt.result==='win').length;return bw-aw});return`<div class="card"><div style="display:flex;justify-content:space-between"><span>👑 ادمین</span><button class="btn btn-outline btn-sm" id="btnLogout">🚪 خروج</button></div><p style="text-align:center">💰 صندوق: <b>${showBalance(appData.casinoBalance)}</b></p><button class="btn btn-sm print-btn" onclick="window.print()">🖨️ پرینت</button></div><div class="card"><div class="tabs"><button class="tab-btn active" data-tab="overview">📊 نمای کلی</button><button class="tab-btn" data-tab="history">📋 تاریخچه</button></div><div class="tab-content active" id="tab-overview"><h3>👥 رتبه‌بندی</h3><div class="table-responsive"><table><thead><tr><th>رتبه</th><th>نام</th><th>یوزر</th><th>موجودی</th><th>برد</th></tr></thead><tbody>${su.map((u,i)=>`<tr><td>${i+1}</td><td>${u.name}</td><td>${u.id}</td><td>${showBalance(u.balance)}</td><td>${appData.bets.filter(b=>b.userId===u.id&&b.result==='win').length}</td></tr>`).join('')}</tbody></table></div>${(()=>{const cm=getCurrentMatch(),um=appData.matches.filter(m=>(m.status==='upcoming'||m.status==='open')&&m!==cm),cl=appData.matches.filter(m=>m.status==='closed').sort((a,b)=>{const at=parseTime(a.time),bt=parseTime(b.time);return(!at||!bt)?0:bt-at});let h='';if(cm)h+='<h3>🟢 بازی جاری</h3>'+renderMatchCard(cm);if(um.length>0)h+='<h3>🔵 پیش‌رو</h3>'+um.map(m=>renderMatchCard(m)).join('');if(cl.length>0)h+='<h3>⚫ گذشته</h3>'+cl.map(m=>renderMatchCard(m,true)).join('');return h})()}</div><div class="tab-content" id="tab-history"><h3>📜 همه شرط‌ها</h3><div class="table-responsive"><table><thead><tr><th>کاربر</th><th>بازی</th><th>تیم</th><th>مبلغ</th><th>نتیجه</th><th>سود</th></tr></thead><tbody>${appData.bets.map(b=>{const u=getUserById(b.userId),m=getMatchById(b.matchId),rc=b.result==='win'?'tr-win':b.result==='lose'?'tr-lose':'',d=m&&m.resultDetail?` (${m.resultDetail})`:'',rt=b.result?`<span class="highlight-result" style="color:${b.result==='win'?'#2ecc71':'#e74c3c'}">${b.result} ${getFlag(b.result)}${d} ${b.result==='win'?'<span class="coin-spin">💰</span>':'<span class="lose-x">❌</span>'}</span>`:'<span class="badge badge-info">در انتظار</span>';return`<tr class="${rc}"><td>${u?u.name:'?'}</td><td>${m?m.team1+' '+getFlag(m.team1)+' vs '+m.team2+' '+getFlag(m.team2):'?'}</td><td>${b.team} ${getFlag(b.team)}</td><td>${formatToman(b.amount)}</td><td>${rt}</td><td style="color:${b.result==='win'?'#2ecc71':b.result==='lose'?'#e74c3c':'#f1c40f'}">${b.result?formatToman(b.profit):'---'}</td></tr>`}).join('')}</tbody></table></div></div></div>`}

            function parseTime(ts){const p=ts.split(' - ');if(p.length!==2)return null;const tp=p[0].trim(),dp=p[1].trim(),[h,mn]=tp.split(':').map(Number),[day,mnth]=dp.split(' '),mm={'فروردین':0,'اردیبهشت':1,'خرداد':2,'تیر':3,'مرداد':4,'شهریور':5,'مهر':6,'آبان':7,'آذر':8,'دی':9,'بهمن':10,'اسفند':11},month=mm[mnth];if(month===undefined||isNaN(h)||isNaN(mn)||isNaN(day))return null;return new Date(new Date().getFullYear(),month,day,h,mn)}

            function attachAdminEvents(){document.getElementById('btnLogout').onclick=logout;document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=function(){document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('tab-'+b.dataset.tab).classList.add('active')})}

            function logout(){currentUser=null;localStorage.removeItem(AUTO_LOGIN_KEY);const gb=document.getElementById('giftBox');if(gb)gb.remove();renderApp()}

            document.getElementById('helpFloat').addEventListener('click',()=>document.getElementById('helpModal').classList.add('active'));
            document.getElementById('closeHelpModal').addEventListener('click',()=>document.getElementById('helpModal').classList.remove('active'));
            document.getElementById('helpModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('active')});

            updateFooter();renderApp();
        })();
    </script>
</body>
</html>
