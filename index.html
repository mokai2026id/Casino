<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>рҹҸҶ Ъ©Ш§ШІЫҢЩҶЩҲЫҢ Ш®Ш§ЩҶЩҲШ§ШҜЪҜЫҢ | Щ…ШӯЩ…ШҜЩ…ЩҮШҜЫҢ</title>
    <style>
        :root {
            --bg: #0a0a14; --surface: #141428; --surface2: #1e1e36;
            --gold: #d4a843; --gold-light: #f0d68a; --text: #f0e6d2;
            --text-secondary: #b0a48e; --border: #2a2a44;
            --radius: 16px; --shadow: 0 12px 40px rgba(0,0,0,0.6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', 'Segoe UI', 'Iranian Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px; line-height: 1.7;
        }
        .app-container { width: 100%; max-width: 520px; }
        .app-container.wide { max-width: 1100px; }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px 24px;
            box-shadow: var(--shadow); position: relative; margin-bottom: 20px;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: var(--radius) var(--radius) 0 0;
        }
        h1, h2, h3 { color: var(--gold-light); text-align: center; margin-bottom: 12px; }
        .footer-text { text-align: center; font-size: 0.75em; color: var(--text-secondary); margin-top: 20px; opacity: 0.8; z-index: 1; }
        .balance-big {
            font-size: 2.2em; font-weight: bold; color: var(--gold-light);
            text-align: center; letter-spacing: 2px;
        }
        input, select {
            width: 100%; padding: 14px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 12px; color: var(--text);
            font-size: 1em; margin: 8px 0;
        }
        .btn {
            display: inline-block; padding: 14px 24px; border: none; border-radius: 12px;
            font-size: 1em; cursor: pointer; font-weight: bold; text-align: center;
        }
        .btn-gold { background: linear-gradient(135deg, #c8963e, #d4a843); color: #1a1a0a; width: 100%; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-sm { padding: 8px 16px; font-size: 0.85em; border-radius: 10px; }
        .table-responsive { overflow-x: auto; margin: 12px 0; border-radius: 12px; background: rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; white-space: nowrap; min-width: 500px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid var(--border); }
        th { background: var(--surface2); color: var(--gold); font-weight: bold; }
        tr:hover td { background: rgba(212,168,67,0.08); }
        .badge {
            display: inline-block; padding: 5px 12px; border-radius: 20px;
            font-size: 0.75em; font-weight: bold;
        }
        .badge-win { background: rgba(39,174,96,0.3); color: #2ecc71; }
        .badge-lose { background: rgba(192,57,43,0.3); color: #e74c3c; }
        .badge-auto { background: rgba(52,152,219,0.3); color: #3498db; }
        .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; border-bottom: 2px solid var(--border); }
        .tab-btn {
            padding: 10px 18px; background: transparent; border: none;
            color: var(--text-secondary); cursor: pointer; font-size: 0.9em;
        }
        .tab-btn.active { color: var(--gold-light); font-weight: bold; background: rgba(212,168,67,0.12); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .match-time {
            display: inline-block; background: rgba(212,168,67,0.2);
            color: var(--gold-light); padding: 4px 12px; border-radius: 20px;
            font-size: 0.8em; margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer"></div>
    <div class="footer-text">Ш·ШұШ§Шӯ Щ…ШӯЩ…ШҜЩ…ЩҮШҜЫҢ | ЩҶШіШ®ЩҮ Ыұ.Ы° | ЫұЫҙЫ°Ыө</div>

    <script>
        (function() {
            // ---------- CONSTANTS ----------
            const STORAGE_KEY = 'casinoFamilyV10';
            const VERSION_KEY = 'casinoDataVersion';
            const DATA_VERSION = 11; // вң… ЩҶШіШ®ЩҮ Ш¬ШҜЫҢШҜ ШЁШ§ ЩҶШӘШ§ЫҢШ¬ ШЁШ§ШІЫҢвҖҢЩҮШ§ЫҢ Ыі ЩҲ Ыҙ

            const DEFAULT_DATA = {
                users: [
                    { id: 'rez', name: 'ШұШ¶Ш§', password: '1234', balance: -5 },
                    { id: 'sep', name: 'ШіЩҫЫҢШҜЩҮ', password: '5678', balance: -25 },
                    { id: 'rey', name: 'ШұЫҢШӯШ§ЩҶЩҮ', password: '1111', balance: 0 },
                    { id: 'ШҙШ§ЫҢШ§ЩҶ', name: 'ШҙШ§ЫҢШ§ЩҶ', password: '2222', balance: -40 }
                ],
                bets: [
                    // Game 1: Canada vs South Africa (closed)
                    { userId: 'rez', matchId: 1, team: 'Ъ©Ш§ЩҶШ§ШҜШ§', amount: 10, odds: 1.5, result: 'win', profit: 5, type: 'manual' },
                    { userId: 'sep', matchId: 1, team: 'Ъ©Ш§ЩҶШ§ШҜШ§', amount: 10, odds: 1.5, result: 'win', profit: 5, type: 'manual' },
                    { userId: 'rey', matchId: 1, team: 'Ъ©Ш§ЩҶШ§ШҜШ§', amount: 10, odds: 1.5, result: 'win', profit: 5, type: 'manual' },
                    { userId: 'ШҙШ§ЫҢШ§ЩҶ', matchId: 1, team: 'ШўЩҒШұЫҢЩӮШ§ЫҢ Ш¬ЩҶЩҲШЁЫҢ', amount: 10, odds: 2.0, result: 'lose', profit: -10, type: 'manual' },
                    // Game 2: Brazil vs Japan (closed)
                    { userId: 'sep', matchId: 2, team: 'ЪҳШ§ЩҫЩҶ', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'ШҙШ§ЫҢШ§ЩҶ', matchId: 2, team: 'ЪҳШ§ЩҫЩҶ', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'rey', matchId: 2, team: 'ШЁШұШІЫҢЩ„', amount: 10, odds: 2.0, result: 'win', profit: 10, type: 'manual' },
                    { userId: 'rez', matchId: 2, team: 'ШЁШұШІЫҢЩ„', amount: 10, odds: 2.0, result: 'win', profit: 10, type: 'manual' },
                    // Game 3: Germany vs Paraguay (Paraguay won on penalties)
                    { userId: 'rez', matchId: 3, team: 'ШўЩ„Щ…Ш§ЩҶ', amount: 10, odds: 1.1, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'rey', matchId: 3, team: 'ШўЩ„Щ…Ш§ЩҶ', amount: 15, odds: 1.1, result: 'lose', profit: -15, type: 'manual' },
                    { userId: 'ШҙШ§ЫҢШ§ЩҶ', matchId: 3, team: 'ШўЩ„Щ…Ш§ЩҶ', amount: 10, odds: 1.1, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'sep', matchId: 3, team: 'ШўЩ„Щ…Ш§ЩҶ', amount: 10, odds: 1.1, result: 'lose', profit: -10, type: 'auto' },
                    // Game 4: Netherlands vs Morocco (Morocco won on penalties)
                    { userId: 'rez', matchId: 4, team: 'ЩҮЩ„ЩҶШҜ', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'rey', matchId: 4, team: 'ЩҮЩ„ЩҶШҜ', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'ШҙШ§ЫҢШ§ЩҶ', matchId: 4, team: 'ЩҮЩ„ЩҶШҜ', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'manual' },
                    { userId: 'sep', matchId: 4, team: 'ЩҮЩ„ЩҶШҜ', amount: 10, odds: 1.5, result: 'lose', profit: -10, type: 'auto' }
                ],
                matches: [
                    { id: 1, team1: 'Ъ©Ш§ЩҶШ§ШҜШ§', team2: 'ШўЩҒШұЫҢЩӮШ§ЫҢ Ш¬ЩҶЩҲШЁЫҢ', odds1: 1.5, odds2: 2.0, result: 'Ъ©Ш§ЩҶШ§ШҜШ§', status: 'closed', time: 'ЫІЫІ:ЫіЫ° - Ы· ШӘЫҢШұ' },
                    { id: 2, team1: 'ШЁШұШІЫҢЩ„', team2: 'ЪҳШ§ЩҫЩҶ', odds1: 2.0, odds2: 1.5, result: 'ШЁШұШІЫҢЩ„', status: 'closed', time: 'ЫІЫ°:ЫіЫ° - Ыё ШӘЫҢШұ' },
                    { id: 3, team1: 'ШўЩ„Щ…Ш§ЩҶ', team2: 'ЩҫШ§ШұШ§ЪҜЩҲШҰЩҮ', odds1: 1.1, odds2: 5.0, result: 'ЩҫШ§ШұШ§ЪҜЩҲШҰЩҮ', status: 'closed', time: 'Ы°Ы°:Ы°Ы° - Ы№ ШӘЫҢШұ' },
                    { id: 4, team1: 'ЩҮЩ„ЩҶШҜ', team2: 'Щ…ШұШ§Ъ©Шҙ', odds1: 1.5, odds2: 2.0, result: 'Щ…ШұШ§Ъ©Шҙ', status: 'closed', time: 'Ы°Ыҙ:ЫіЫ° - Ы№ ШӘЫҢШұ' }
                ],
                casinoBalance: 80   // Щ…ШӯШ§ШіШЁЩҮвҖҢШҙШҜЩҮ: ЩӮШЁЩ„ЫҢ -5 + 45 (ШЁШ§ШІЫҢ Ыі) + 40 (ШЁШ§ШІЫҢ Ыҙ) = 80 ЩҮШІШ§Шұ ШӘЩҲЩ…Ш§ЩҶ
            };

            const countryFlags = {
                'Ъ©Ш§ЩҶШ§ШҜШ§': 'рҹҮЁрҹҮҰ', 'ШўЩҒШұЫҢЩӮШ§ЫҢ Ш¬ЩҶЩҲШЁЫҢ': 'рҹҮҝрҹҮҰ', 'ШЁШұШІЫҢЩ„': 'рҹҮ§рҹҮ·', 'ЪҳШ§ЩҫЩҶ': 'рҹҮҜрҹҮө',
                'ШўЩ„Щ…Ш§ЩҶ': 'рҹҮ©рҹҮӘ', 'ЩҫШ§ШұШ§ЪҜЩҲШҰЩҮ': 'рҹҮөрҹҮҫ', 'ЩҮЩ„ЩҶШҜ': 'рҹҮірҹҮұ', 'Щ…ШұШ§Ъ©Шҙ': 'рҹҮІрҹҮҰ'
            };
            function getFlag(c) { return countryFlags[c] || 'рҹҸіпёҸ'; }

            function loadData() {
                const savedVersion = localStorage.getItem(VERSION_KEY);
                const savedData = localStorage.getItem(STORAGE_KEY);
                if (!savedVersion || parseInt(savedVersion) < DATA_VERSION) {
                    localStorage.setItem(VERSION_KEY, DATA_VERSION);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_DATA));
                    return JSON.parse(JSON.stringify(DEFAULT_DATA));
                }
                if (savedData) {
                    try { return JSON.parse(savedData); } catch (e) {}
                }
                return JSON.parse(JSON.stringify(DEFAULT_DATA));
            }

            let appData = loadData();
            let currentUser = null;

            function formatToman(v) {
                return (v * 1000).toLocaleString('fa-IR') + ' ШӘЩҲЩ…Ш§ЩҶ';
            }
            function showBalance(v) {
                return (v * 1000).toLocaleString('fa-IR') + ' ШӘЩҲЩ…Ш§ЩҶ';
            }
            function getUserById(id) { return appData.users.find(u => u.id === id); }
            function getMatchById(id) { return appData.matches.find(m => m.id === id); }

            function renderApp() {
                const container = document.getElementById('appContainer');
                if (!currentUser) {
                    container.classList.remove('wide');
                    container.innerHTML = renderLogin();
                    attachLoginEvents();
                } else if (currentUser.id === 'admin') {
                    container.classList.add('wide');
                    container.innerHTML = renderAdminPanel();
                    attachAdminEvents();
                } else {
                    container.classList.remove('wide');
                    container.innerHTML = renderUserPanel();
                    attachUserEvents();
                }
            }

            function renderLogin() {
                return `
                <div class="card">
                    <h1>рҹҺ° Ъ©Ш§ШІЫҢЩҶЩҲЫҢ Ш®Ш§ЩҶЩҲШ§ШҜЪҜЫҢ</h1>
                    <p style="text-align:center;">Щ„Ш·ЩҒШ§ЩӢ ЩҶШ§Щ… Ъ©Ш§ШұШЁШұЫҢ ЩҲ ШұЩ…ШІ Ш®ЩҲШҜ ШұШ§ ЩҲШ§ШұШҜ Ъ©ЩҶЫҢШҜ</p>
                    <input type="text" id="loginUsername" placeholder="ЩҶШ§Щ… Ъ©Ш§ШұШЁШұЫҢ">
                    <input type="password" id="loginPassword" placeholder="ШұЩ…ШІ Ш№ШЁЩҲШұ" inputmode="numeric" pattern="[0-9]*">
                    <button class="btn btn-gold" id="btnLoginUser">ЩҲШұЩҲШҜ Ъ©Ш§ШұШЁШұ</button>
                    <button class="btn btn-outline" id="btnAdminLogin" style="width:100%; margin-top:8px;">ЩҲШұЩҲШҜ Ш§ШҜЩ…ЫҢЩҶ</button>
                </div>`;
            }

            function attachLoginEvents() {
                document.getElementById('btnLoginUser').onclick = () => {
                    const uid = document.getElementById('loginUsername').value.trim();
                    const pwd = document.getElementById('loginPassword').value.trim();
                    if (!uid || !pwd) return alert('Щ„Ш·ЩҒШ§ЩӢ ЩҮШұ ШҜЩҲ ЩҒЫҢЩ„ШҜ ШұШ§ ЩҫШұ Ъ©ЩҶЫҢШҜ.');
                    const user = appData.users.find(u => u.id === uid && u.password === pwd);
                    if (user) { currentUser = user; renderApp(); }
                    else alert('вқҢ ЩҶШ§Щ… Ъ©Ш§ШұШЁШұЫҢ ЫҢШ§ ШұЩ…ШІ Ш§ШҙШӘШЁШ§ЩҮ Ш§ШіШӘ.');
                };
                document.getElementById('btnAdminLogin').onclick = () => {
                    const pass = prompt('ШұЩ…ШІ Ш§ШҜЩ…ЫҢЩҶ (ЫұЫІ ШұЩӮЩ…ЫҢ):');
                    if (pass === '123123456') { currentUser = { id: 'admin', name: 'Ш§ШҜЩ…ЫҢЩҶ' }; renderApp(); }
                    else alert('вқҢ ШұЩ…ШІ Ш§ШҜЩ…ЫҢЩҶ ЩҶШ§ШҜШұШіШӘ Ш§ШіШӘ.');
                };
            }

            function renderUserPanel() {
                const user = getUserById(currentUser.id);
                if (!user) { logout(); return ''; }
                const openMatches = appData.matches.filter(m => m.status === 'open');
                const upcomingMatches = appData.matches.filter(m => m.status === 'upcoming');
                const bets = appData.bets.filter(b => b.userId === user.id);
                const totalProfit = bets.reduce((s, b) => s + (b.profit || 0), 0);

                return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <span>рҹ‘Ө ${user.name} (${user.id})</span>
                        <button class="btn btn-outline btn-sm" id="btnLogout">рҹҡӘ Ш®ШұЩҲШ¬</button>
                    </div>
                    <div class="balance-big">рҹ’° Щ…ЩҲШ¬ЩҲШҜЫҢ: ${showBalance(user.balance)}</div>
                    <p style="text-align:center;">ШіЩҲШҜ/ШІЫҢШ§ЩҶ Ъ©Щ„: <b style="color:${totalProfit>=0?'#2ecc71':'#e74c3c'}">${formatToman(totalProfit)}</b></p>
                </div>

                <div class="card">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="dashboard">рҹ“Ҡ ШЁШ§ШІЫҢвҖҢЩҮШ§</button>
                        <button class="tab-btn" data-tab="history">рҹ“Ӣ ШӘШ§ШұЫҢШ®ЪҶЩҮ</button>
                    </div>
                    <div class="tab-content active" id="tab-dashboard">
                        ${openMatches.length > 0 ? `
                        <h3>рҹҹў ШЁШ§ШІЫҢ Ш¬Ш§ШұЫҢ</h3>
                        ${openMatches.map(m => `
                        <div class="card" style="margin-bottom:12px;">
                            <b>${m.team1} ${getFlag(m.team1)} vs ${m.team2} ${getFlag(m.team2)}</b>
                            <p>${m.time} | Ш¶ШұШ§ЫҢШЁ: ${m.team1} ${m.odds1}x, ${m.team2} ${m.odds2}x</p>
                            <div class="form-group">
                                <label>рҹ’ө Щ…Ш§ШҙЫҢЩҶ ШӯШіШ§ШЁ ШіЩҲШҜ (ШӘЩҲЩ…Ш§ЩҶ)</label>
                                <input type="number" id="calcAmount_${m.id}" min="0" value="" placeholder="Щ…ШЁЩ„Шә ШҙШұШ·">
                            </div>
                            <div style="display:flex; justify-content:center; gap:2rem;">
                                <span>${m.team1}: <b id="calcProfit1_${m.id}">${formatToman(0)}</b></span>
                                <span>${m.team2}: <b id="calcProfit2_${m.id}">${formatToman(0)}</b></span>
                            </div>
                        </div>`).join('')}
                        ` : '<p style="text-align:center;">ЩҮЫҢЪҶ ШЁШ§ШІЫҢ Ш¬Ш§ШұЫҢвҖҢШ§ЫҢ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ.</p>'}

                        ${upcomingMatches.length > 0 ? `
                        <h3>рҹ”ө ШЁШ§ШІЫҢвҖҢЩҮШ§ЫҢ ЩҫЫҢШҙвҖҢШұЩҲ</h3>
                        ${upcomingMatches.map(m => `
                        <div class="card">
                            <b>${m.team1} ${getFlag(m.team1)} vs ${m.team2} ${getFlag(m.team2)}</b>
                            <p>${m.time} | Ш¶ШұШ§ЫҢШЁ: ${m.team1} ${m.odds1}x, ${m.team2} ${m.odds2}x</p>
                        </div>`).join('')}
                        ` : ''}
                    </div>

                    <div class="tab-content" id="tab-history">
                        <h3>рҹ“Ӣ ШҙШұШ·вҖҢЩҮШ§ЫҢ Щ…ЩҶ</h3>
                        ${bets.length === 0 ? '<p>ШҙШұШ·ЫҢ Ш«ШЁШӘ ЩҶШҙШҜЩҮ.</p>' : `
                        <div class="table-responsive">
                        <table><thead><tr><th>ШЁШ§ШІЫҢ</th><th>ШӘЫҢЩ…</th><th>Щ…ШЁЩ„Шә</th><th>Ш¶ШұЫҢШЁ</th><th>ЩҶШӘЫҢШ¬ЩҮ</th><th>ШіЩҲШҜ/ШІЫҢШ§ЩҶ</th></tr></thead><tbody>
                        ${bets.map(b => {
                            const m = getMatchById(b.matchId);
                            let badge = '';
                            if (b.result === 'win') badge = '<span class="badge badge-win">ШЁШұШҜ</span>';
                            else if (b.result === 'lose') badge = '<span class="badge badge-lose">ШЁШ§Ш®ШӘ</span>';
                            else if (b.type === 'auto') badge = '<span class="badge badge-auto">Ш®ЩҲШҜЪ©Ш§Шұ вҡЎ</span>';
                            else badge = '<span class="badge" style="background:rgba(241,196,15,0.25);color:#f1c40f;">ШҜШұ Ш§ЩҶШӘШёШ§Шұ</span>';
                            return `<tr>
                                <td>${m ? m.team1 + ' ' + getFlag(m.team1) + ' vs ' + m.team2 + ' ' + getFlag(m.team2) : '?'}</td>
                                <td>${b.team} ${getFlag(b.team)}</td>
                                <td>${formatToman(b.amount)}</td>
                                <td>${b.odds}x</td>
                                <td>${badge}</td>
                                <td style="color:${b.result==='win'?'#2ecc71':b.result==='lose'?'#e74c3c':'#f1c40f'}">${b.result ? formatToman(b.profit) : '---'}</td>
                            </tr>`;
                        }).join('')}
                        </tbody></table></div>`}
                    </div>
                </div>`;
            }

            function attachUserEvents() {
                document.getElementById('btnLogout').onclick = logout;
                document.querySelectorAll('.tab-btn').forEach(b => b.onclick = function() {
                    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('tab-' + b.dataset.tab).classList.add('active');
                });

                const openMatches = appData.matches.filter(m => m.status === 'open');
                openMatches.forEach(m => {
                    const input = document.getElementById('calcAmount_' + m.id);
                    if (input) {
                        input.addEventListener('input', function() {
                            const amount = parseInt(this.value) || 0;
                            const profit1 = Math.round(amount * m.odds1 - amount);
                            const profit2 = Math.round(amount * m.odds2 - amount);
                            const el1 = document.getElementById('calcProfit1_' + m.id);
                            const el2 = document.getElementById('calcProfit2_' + m.id);
                            if (el1) el1.textContent = formatToman(profit1 / 1000);
                            if (el2) el2.textContent = formatToman(profit2 / 1000);
                        });
                    }
                });
            }

            function renderAdminPanel() {
                const sortedUsers = [...appData.users].sort((a, b) => {
                    if (b.balance !== a.balance) return b.balance - a.balance;
                    const aWins = appData.bets.filter(bet => bet.userId === a.id && bet.result === 'win').length;
                    const bWins = appData.bets.filter(bet => bet.userId === b.id && bet.result === 'win').length;
                    return bWins - aWins;
                });

                const openMatches = appData.matches.filter(m => m.status === 'open');
                const upcomingMatches = appData.matches.filter(m => m.status === 'upcoming');
                const closedMatches = appData.matches.filter(m => m.status === 'closed');

                return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <span>рҹ‘‘ Ш§ШҜЩ…ЫҢЩҶ (Щ…ШҜЫҢШұ Ъ©Щ„)</span>
                        <button class="btn btn-outline btn-sm" id="btnLogout">рҹҡӘ Ш®ШұЩҲШ¬</button>
                    </div>
                    <p style="text-align:center;">рҹ’° ШөЩҶШҜЩҲЩӮ: <b>${showBalance(appData.casinoBalance)}</b></p>
                </div>

                <div class="card">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="overview">рҹ“Ҡ ЩҶЩ…Ш§ЫҢ Ъ©Щ„ЫҢ</button>
                        <button class="tab-btn" data-tab="history">рҹ“Ӣ ШӘШ§ШұЫҢШ®ЪҶЩҮ</button>
                    </div>

                    <div class="tab-content active" id="tab-overview">
                        <h3>рҹ‘Ҙ ШұШӘШЁЩҮвҖҢШЁЩҶШҜЫҢ Ъ©Ш§ШұШЁШұШ§ЩҶ</h3>
                        <div class="table-responsive">
                        <table><thead><tr><th>ШұШӘШЁЩҮ</th><th>ЩҶШ§Щ…</th><th>ЫҢЩҲШІШұ</th><th>Щ…ЩҲШ¬ЩҲШҜЫҢ</th><th>ШӘШ№ШҜШ§ШҜ ШЁШұШҜ</th></tr></thead><tbody>
                        ${sortedUsers.map((u, i) => `
                            <tr>
                                <td>${i+1}</td>
                                <td>${u.name}</td>
                                <td>${u.id}</td>
                                <td>${showBalance(u.balance)}</td>
                                <td>${appData.bets.filter(b => b.userId === u.id && b.result === 'win').length}</td>
                            </tr>
                        `).join('')}
                        </tbody></table></div>

                        ${openMatches.length > 0 ? `
                        <h3>рҹҹў ШЁШ§ШІЫҢвҖҢЩҮШ§ЫҢ Ш¬Ш§ШұЫҢ</h3>
                        ${openMatches.map(m => `
                        <div class="card" style="margin-bottom:12px;">
                            <b>${m.team1} ${getFlag(m.team1)} vs ${m.team2} ${getFlag(m.team2)}</b>
                            <p>${m.time} | Ш¶ШұШ§ЫҢШЁ: ${m.team1} ${m.odds1}x, ${m.team2} ${m.odds2}x</p>
                        </div>`).join('')}` : ''}

                        ${upcomingMatches.length > 0 ? `
                        <h3>рҹ”ө ШЁШ§ШІЫҢвҖҢЩҮШ§ЫҢ ЩҫЫҢШҙвҖҢШұЩҲ</h3>
                        ${upcomingMatches.map(m => `
                        <div class="card">
                            <b>${m.team1} ${getFlag(m.team1)} vs ${m.team2} ${getFlag(m.team2)}</b>
                            <p>${m.time} | Ш¶ШұШ§ЫҢШЁ: ${m.team1} ${m.odds1}x, ${m.team2} ${m.odds2}x</p>
                        </div>`).join('')}` : ''}

                        ${closedMatches.length > 0 ? `
                        <h3>вҡ« ШЁШ§ШІЫҢвҖҢЩҮШ§ЫҢ ЪҜШ°ШҙШӘЩҮ</h3>
                        ${closedMatches.map(m => `
                        <div class="card">
                            <b>${m.team1} ${getFlag(m.team1)} vs ${m.team2} ${getFlag(m.team2)}</b>
                            <p>${m.time} | Ш¶ШұШ§ЫҢШЁ: ${m.team1} ${m.odds1}x, ${m.team2} ${m.odds2}x | ЩҶШӘЫҢШ¬ЩҮ: ${m.result}</p>
                        </div>`).join('')}` : ''}
                    </div>

                    <div class="tab-content" id="tab-history">
                        <h3>рҹ“ң ШӘШ§ШұЫҢШ®ЪҶЩҮ ЩҮЩ…ЩҮ ШҙШұШ·вҖҢЩҮШ§</h3>
                        <div class="table-responsive">
                        <table><thead><tr><th>Ъ©Ш§ШұШЁШұ</th><th>ШЁШ§ШІЫҢ</th><th>ШӘЫҢЩ…</th><th>Щ…ШЁЩ„Шә</th><th>Ш¶ШұЫҢШЁ</th><th>ЩҶШӘЫҢШ¬ЩҮ</th><th>ШіЩҲШҜ</th></tr></thead><tbody>
                        ${appData.bets.map(b => {
                            const u = getUserById(b.userId);
                            const m = getMatchById(b.matchId);
                            let resultBadge = '';
                            if (b.result === 'win') resultBadge = '<span class="badge badge-win">ШЁШұШҜ</span>';
                            else if (b.result === 'lose') resultBadge = '<span class="badge badge-lose">ШЁШ§Ш®ШӘ</span>';
                            else if (b.type === 'auto') resultBadge = '<span class="badge badge-auto">Ш®ЩҲШҜЪ©Ш§Шұ вҡЎ</span>';
                            else resultBadge = '<span class="badge" style="background:rgba(241,196,15,0.25);color:#f1c40f;">ШҜШұ Ш§ЩҶШӘШёШ§Шұ</span>';
                            return `<tr>
                                <td>${u ? u.name : '?'}</td>
                                <td>${m ? m.team1 + ' ' + getFlag(m.team1) + ' vs ' + m.team2 + ' ' + getFlag(m.team2) : '?'}</td>
                                <td>${b.team} ${getFlag(b.team)}</td>
                                <td>${formatToman(b.amount)}</td>
                                <td>${b.odds}x</td>
                                <td>${resultBadge}</td>
                                <td style="color:${b.result==='win'?'#2ecc71':b.result==='lose'?'#e74c3c':'#f1c40f'}">${b.result ? formatToman(b.profit) : '---'}</td>
                            </tr>`;
                        }).join('')}
                        </tbody></table></div>
                    </div>
                </div>`;
            }

            function attachAdminEvents() {
                document.getElementById('btnLogout').onclick = logout;
                document.querySelectorAll('.tab-btn').forEach(b => b.onclick = function() {
                    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('tab-' + b.dataset.tab).classList.add('active');
                });
            }

            function logout() { currentUser = null; renderApp(); }

            renderApp();
        })();
    </script>
</body>
</html>
